<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box; /* ✅ FIX MAIN ISSUE */
  font-family:Poppins,sans-serif;
}

/* BACKGROUND */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  overflow:hidden;
}

/* ANIMATED BG */
body::before{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background:#ff4d8d;
  border-radius:50%;
  top:-100px;
  left:-100px;
  filter:blur(120px);
  animation:move 8s infinite alternate;
}
body::after{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background:#00c6ff;
  border-radius:50%;
  bottom:-100px;
  right:-100px;
  filter:blur(120px);
  animation:move 10s infinite alternate;
}

@keyframes move{
  0%{transform:translate(0,0);}
  100%{transform:translate(50px,50px);}
}

/* CARD */
.card{
  width:360px;
  padding:30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:15px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  text-align:center;
  color:#fff;
  position:relative;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* ICON */
.icon{
  font-size:35px;
  margin-bottom:10px;
  color:#ff4d8d;
  animation:float 2s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* TITLE */
h2{
  margin-bottom:5px;
}
.sub{
  font-size:13px;
  color:#ccc;
  margin-bottom:20px;
}

/* INPUT */
.input-box{
  position:relative;
  margin-bottom:18px;
  width:100%;
}

.input-box input{
  width:100%;
  padding:12px 40px 12px 40px; /* spacing for icon */
  background:transparent;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:8px;
  color:#fff;
  outline:none;
  transition:0.3s;
}

/* ICON INSIDE INPUT */
.input-box i{
  position:absolute;
  top:50%;
  left:12px;
  transform:translateY(-50%);
  color:#aaa;
}

/* FOCUS */
.input-box input:focus{
  border-color:#ff4d8d;
  box-shadow:0 0 10px rgba(255,77,141,0.5);
}

/* PASSWORD EYE */
.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#aaa;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#ff4d8d,#ff7eb3);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(255,77,141,0.5);
}

/* LINKS */
.links{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-top:10px;
}

.links a{
  color:#ccc;
  text-decoration:none;
}

.links a:hover{
  color:#ff4d8d;
}

/* SOCIAL */
.social{
  margin-top:20px;
}

.social p{
  font-size:13px;
  margin-bottom:10px;
}

.social-icons{
  display:flex;
  justify-content:center;
  gap:15px;
}

.social-icons i{
  width:35px;
  height:35px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#fff;
  color:#333;
  cursor:pointer;
  transition:0.3s;
}

.social-icons i:hover{
  background:#ff4d8d;
  color:#fff;
  transform:scale(1.2);
}

/* ERROR */
#error{
  color:#ff6b6b;
  font-size:13px;
  margin-top:10px;
}
.input-box input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:6px;
  outline:none;
  box-sizing:border-box; /* 🔥 THIS FIXES OVERFLOW */
}
</style>
</head>
<body>

<div class="card">

  <div class="icon">
    <i class="fa fa-user"></i>
  </div>

  <h2>Create Account</h2>
  <p class="sub">Join us and explore more features 🚀</p>

  <!-- USER -->
  <div class="input-box">
    <i class="fa fa-user"></i>
    <input type="text" id="username" placeholder="Username">
  </div>

  <!-- EMAIL -->
  <div class="input-box">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" placeholder="Email">
  </div>

  <!-- PASSWORD -->
  <div class="input-box">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Password">
    <i class="fa fa-eye eye" onclick="togglePass()"></i>
  </div>

  <button onclick="signup()">Sign Up</button>

  <div class="links">
    <a href="404.html">Forgot Password?</a>
    <a href="login.html">Login</a>
  </div>

  <div id="error"></div>

  <!-- SOCIAL -->
  <div class="social">
    <p>Or sign in with</p>
    <div class="social-icons">
      <i class="fab fa-google"></i>
      <i class="fab fa-facebook-f"></i>
      <i class="fab fa-github"></i>
    </div>
  </div>

</div>
<script>
function signup(){
  let user = document.getElementById("username").value.trim();
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("password").value.trim();

  let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

  if(user === "" || email === "" || pass === ""){
    document.getElementById("error").innerText = "All fields are required!";
    return;
  }

  if(!emailPattern.test(email)){
    document.getElementById("error").innerText = "Enter valid email!";
    return;
  }

  if(pass.length < 4){
    document.getElementById("error").innerText = "Password must be at least 4 characters!";
    return;
  }

  // ✅ SAVE DATA (for login use)
  localStorage.setItem("user", user);
  localStorage.setItem("email", email);
  localStorage.setItem("pass", pass);

  // ✅ REDIRECT TO LOGIN
  window.location.href = "login.html";
}
</script>

</body>
</html>
