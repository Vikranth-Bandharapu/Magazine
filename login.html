<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box; /* 🔥 FIX OVERFLOW */
  font-family:Poppins, sans-serif;
}

/* BACKGROUND */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  overflow:hidden;
}

/* GLOW BACKGROUND */
body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#ff3b3f;
  filter:blur(200px);
  top:-100px;
  left:-100px;
  opacity:0.5;
}

/* CARD */
.login-card{
  width:360px;
  padding:35px 25px;
  border-radius:15px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  text-align:center;
  color:#fff;
  animation:fadeIn 1s ease;
  position:relative;
}

/* ENTRY ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* ICON */
.icon{
  font-size:40px;
  margin-bottom:10px;
  color:#ff3b3f;
  animation:float 2s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

h2{
  margin-bottom:5px;
}

.sub{
  font-size:13px;
  opacity:0.7;
  margin-bottom:25px;
}

/* INPUT */
.input-box{
  position:relative;
  margin-bottom:18px;
}

.input-box input{
  width:100%;
  padding:12px 40px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:#fff;
  outline:none;
  transition:0.3s;
}

/* ICON INSIDE INPUT */
.input-box i{
  position:absolute;
  top:50%;
  left:12px;
  transform:translateY(-50%);
  color:#ccc;
}

/* LABEL */
.input-box label{
  position:absolute;
  top:50%;
  left:40px;
  transform:translateY(-50%);
  color:#ccc;
  font-size:14px;
  transition:0.3s;
  pointer-events:none;
}

/* FLOAT LABEL */
.input-box input:focus + label,
.input-box input:valid + label{
  top:-8px;
  left:10px;
  font-size:12px;
  color:#ff3b3f;
}

/* FOCUS EFFECT */
.input-box input:focus{
  border-color:#ff3b3f;
  box-shadow:0 0 10px rgba(255,59,63,0.4);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#ff3b3f,#ff6b6b);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(255,59,63,0.6);
}

/* LINKS */
.links{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:10px;
}

.links a{
  color:#ccc;
  text-decoration:none;
}

.links a:hover{
  color:#fff;
}

/* SOCIAL */
.social{
  margin-top:20px;
}

.social p{
  font-size:13px;
  margin-bottom:10px;
  opacity:0.7;
}

.social-icons{
  display:flex;
  justify-content:center;
  gap:15px;
}

.social-icons i{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:50%;
  cursor:pointer;
  transition:0.3s;
}

.social-icons i:hover{
  background:#ff3b3f;
  transform:scale(1.1);
}

/* ERROR */
#error{
  color:#ff6b6b;
  font-size:13px;
  margin-top:10px;
}
.input-box input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:6px;
  outline:none;
  box-sizing:border-box; /* 🔥 THIS FIXES OVERFLOW */
}

</style>
</head>
<body>

<div class="login-card">

  <div class="icon">
    <i class="fa fa-user-circle"></i>
  </div>

  <h2>Welcome Back</h2>
  <p class="sub">Login to continue</p>

  <!-- USERNAME -->
  <div class="input-box">
    <i class="fa fa-user"></i>
    <input type="text" id="username" required>
    <label>Username</label>
  </div>

  <!-- EMAIL -->
  <div class="input-box">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" required>
    <label>Email</label>
  </div>

  <!-- PASSWORD -->
  <div class="input-box">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" required>
    <label>Password</label>
  </div>

  <button onclick="login()">Login</button>

  <div class="links">
    <a href="404.html">Forgot Password?</a>
    <a href="signin.html">Sign Up</a>
  </div>

  <div class="social">
    <p>Or login with</p>
    <div class="social-icons">
      <i class="fab fa-google"></i>
      <i class="fab fa-facebook-f"></i>
      <i class="fab fa-github"></i>
    </div>
  </div>

  <p id="error"></p>

</div>
<script>
function login(){
  let user = document.getElementById("username").value.trim();
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("password").value.trim();

  let savedUser = localStorage.getItem("user");
  let savedEmail = localStorage.getItem("email");
  let savedPass = localStorage.getItem("pass");

  if(user === "" || email === "" || pass === ""){
    document.getElementById("error").innerText = "All fields are required!";
    return;
  }

  // ✅ CHECK MATCH
  if(user === savedUser && email === savedEmail && pass === savedPass){
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").innerText = "Invalid credentials!";
  }
}
</script>
</body>
</html>
