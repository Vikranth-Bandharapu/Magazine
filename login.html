<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly Pro Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

/* BODY */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  overflow:hidden;
}

/* GLOW BACKGROUND */
body::before{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:#ff3b3f;
  filter:blur(120px);
  top:-100px;
  left:-100px;
}

body::after{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:#00c6ff;
  filter:blur(120px);
  bottom:-100px;
  right:-100px;
}

/* CARD */
.card{
  width:360px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  color:#fff;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* TITLE */
h2{
  text-align:center;
}
.sub{
  text-align:center;
  font-size:13px;
  color:#ccc;
  margin-bottom:20px;
}

/* TOGGLE */
.toggle{
  display:flex;
  background:#1f2937;
  border-radius:50px;
  margin-bottom:20px;
  position:relative;
}

.toggle span{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
  z-index:2;
}

.slider{
  position:absolute;
  width:50%;
  height:100%;
  background:linear-gradient(45deg,#ff3b3f,#ff6b6b);
  border-radius:50px;
  transition:0.3s;
}

.admin-active .slider{
  transform:translateX(100%);
}

/* INPUT */
.input-box{
  position:relative;
  margin-bottom:18px;
}
.input-box input{
  width:100%;
  padding:12px 40px; /* normal padding */
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  outline:none;
}

.input-box i{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
}

/* EYE */
.eye{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#bbb;
  transition:0.3s;
}

.eye:hover{
  color:#fff;
}
.input-box input{
  cursor:text;   /* 🔥 always text cursor */
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#ff3b3f,#ff6b6b);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* LINKS */
.links{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-top:10px;
}

.links a{
  color:#ccc;
  text-decoration:none;
}

.links a:hover{
  color:#ff3b3f;
}

/* ERROR */
#error{
  color:#ff6b6b;
  font-size:13px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

  <h2>Welcome Back</h2>
  <p class="sub">Login to Stackly 🚀</p>

  <!-- TOGGLE -->
  <div class="toggle" id="toggle">
    <div class="slider"></div>
    <span onclick="setUser()">User</span>
    <span onclick="setAdmin()">Admin</span>
  </div>

  <!-- EMAIL -->
  <div class="input-box">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" placeholder="Email">
  </div>

  <!-- PASSWORD -->
  <div class="input-box">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Password">
    
  </div>

  <button onclick="login()">Login</button>

  <div class="links">
    <a href="404.html">Forgot?</a>
    <a href="signin.html">Register</a>
  </div>

  <p id="error"></p>

</div>

<script>

let role = "user";

function setUser(){
  role = "user";
  document.getElementById("toggle").classList.remove("admin-active");
}

function setAdmin(){
  role = "admin";
  document.getElementById("toggle").classList.add("admin-active");
}


function login(){
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("password").value.trim();

  if(email === "" || pass === ""){
    document.getElementById("error").innerText = "All fields required!";
    return;
  }

  // 🔥 SAVE ROLE
  localStorage.setItem("role", role);

  // 🔥 REDIRECT
  if(role === "user"){
    window.location.href = "dashboard1.html";
  } else {
    window.location.href = "dashboard2.html";
  }
}

</script>

</body>
</html>
